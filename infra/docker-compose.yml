# Phase 1 infra: Postgres + Redis + the FastAPI backend.
# Kafka/Zookeeper are added in Phase 7 (streaming pipeline) and MLflow in Phase 9,
# kept out for now so `docker compose up` stays fast and easy to reason about.
#
# Phase 7 update: backend build context/dockerfile path fixed to match the
# Phase 6 Dockerfile, which now expects the REPO ROOT as context (it copies
# ml/, data/, docs/ as siblings of backend/ inside the image — see
# backend/Dockerfile's header comment). Postgres/Redis are kept available
# for future phases but the backend no longer waits on them — the current
# API reads parquet files directly and doesn't connect to either yet.

services:
  postgres:
    image: postgres:16-alpine
    container_name: parking_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-parking}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-parking_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-parking_intelligence}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-parking}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: parking_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..              # repo root — required, see backend/Dockerfile header
      dockerfile: backend/Dockerfile
    container_name: parking_backend
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "8000:8000"

volumes:
  postgres_data:
